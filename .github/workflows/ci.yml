name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Spotless
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Pure source formatting — no NeoForge/Minecraft download required.
      - name: Check formatting (spotlessCheck)
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

  build:
    name: Build & GameTest (standalone, no Create)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # Boots a dedicated server with no Create on the classpath and runs the
      # GameTest suite — guards the "loads standalone" contract (DESIGN.md §9)
      # and the test strategy (§10). With no tests registered yet it simply
      # verifies the mod loads server-side and exits cleanly.
      - name: Run GameTests (standalone)
        run: ./gradlew runGameTestServer --no-daemon --stacktrace

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: toxicsurface-jar
          path: build/libs/*.jar
          if-no-files-found: warn
