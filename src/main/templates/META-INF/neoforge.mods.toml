modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/thomasjoleary/ToxicSurface/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Optional soft-dependencies (DESIGN.md §9). The mod loads and plays standalone;
# Create-coupled features activate only when Create is present (datapack recipes are
# condition-gated; runtime-Java paths are guarded by CreateCompat#isLoaded).
[[dependencies.${mod_id}]]
modId = "create"
type = "optional"
versionRange = "[6.0.0,)"
ordering = "AFTER"
side = "BOTH"

# JEI (Phase 8): ingredient-info pages for the no-recipe mechanics. Client-only and
# purely additive — the @JeiPlugin loads only when JEI is present.
[[dependencies.${mod_id}]]
modId = "jei"
type = "optional"
versionRange = "[19.0.0,)"
ordering = "AFTER"
side = "CLIENT"

# EMI (Phase 8): the same info pages via EMI's own API. Client-only and additive —
# the @EmiEntrypoint plugin loads only when EMI is present.
[[dependencies.${mod_id}]]
modId = "emi"
type = "optional"
versionRange = "[1.1.0,)"
ordering = "AFTER"
side = "CLIENT"
