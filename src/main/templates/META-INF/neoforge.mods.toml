modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/thomasjoleary/ToxicSurface/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Optional soft-dependencies (DESIGN.md §9). The mod loads and plays standalone;
# Create-coupled features activate only when Create is present (datapack recipes are
# condition-gated; runtime-Java paths are guarded by CreateCompat#isLoaded).
[[dependencies.${mod_id}]]
modId = "create"
type = "optional"
versionRange = "[6.0.0,)"
ordering = "AFTER"
side = "BOTH"
